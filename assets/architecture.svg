<text x="340" y="452" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854f0b">Provider-agnostic · Swap models at runtime</text>

<!-- Arrow: LLM layer to providers -->
<line x1="340" y1="464" x2="340" y2="494" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Provider boxes -->
<rect x="40"  y="494" width="120" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
