<text x="100" y="528" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993c1d">LLaMA · Mixtral</text>

<rect x="180" y="494" width="120" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="240" y="512" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712b13">Ollama</text>
<text x="240" y="528" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993c1d">Local models</text>

<rect x="320" y="494" width="120" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="380" y="512" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712b13">OpenAI</text>
<text x="380" y="528" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993c1d">GPT-4o</text>

<rect x="460" y="494" width="120" height="44" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="520" y="512" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712b13">Gemini</text>
<text x="520" y="528" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993c1d">Flash · Pro</text>

<!-- Connecting lines from amber to providers -->
<line x1="260" y1="464" x2="140" y2="494" stroke="#ccc" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="300" y1="464" x2="250" y2="494" stroke="#ccc" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="380" y1="464" x2="380" y2="494" stroke="#ccc" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="420" y1="464" x2="490" y2="494" stroke="#ccc" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- ChromaDB and SQLite -->
<line x1="120" y1="358" x2="120" y2="568" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="120" y1="568" x2="152" y2="568" stroke="#ccc" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="560" y1="358" x2="560" y2="568" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="560" y1="568" x2="528" y2="568" stroke="#ccc" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="152" y="556" width="160" height="44" rx="8" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.5"/>
<text x="232" y="574" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500a">ChromaDB</text>
<text x="232" y="590" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3b6d11">Vector store</text>

<rect x="368" y="556" width="160" height="44" rx="8" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.5"/>
<text x="448" y="574" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500a">SQLite / PostgreSQL</text>
<text x="448" y="590" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3b6d11">Structured data</text>
</svg>
