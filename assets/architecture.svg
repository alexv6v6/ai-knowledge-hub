<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#f8f6f1;font-family:sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- User -->
<rect x="255" y="20" width="170" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2c2c2a">User</text>

<!-- Arrow: User to UI -->
<line x1="340" y1="64" x2="340" y2="96" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Streamlit UI -->
<rect x="100" y="96" width="480" height="60" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="118" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3c3489">Streamlit UI</text>
<text x="340" y="142" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534ab7">💬 Chat  ·  📊 Dashboard  ·  🔀 Model Comparator</text>

<!-- FastAPI -->
<rect x="460" y="160" width="160" height="44" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="540" y="178" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3c3489">FastAPI</text>
<text x="540" y="194" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534ab7">REST API</text>
<line x1="460" y1="182" x2="420" y2="210" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow: UI to Agent -->
<line x1="340" y1="156" x2="340" y2="196" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Knowledge Agent -->
<rect x="180" y="196" width="320" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="340" y="218" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Knowledge Agent</text>
<text x="340" y="240" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0f6e56">Query routing · Context synthesis</text>

<!-- Arrows: Agent to RAG and SQL -->
<line x1="260" y1="252" x2="200" y2="302" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="420" y1="252" x2="480" y2="302" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- RAG Pipeline -->
<rect x="60" y="302" width="260" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="190" y="324" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0c447c">RAG Pipeline</text>
<text x="190" y="346" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185fa5">Semantic search · Document context</text>

<!-- SQL Pipeline -->
<rect x="360" y="302" width="260" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="490" y="324" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0c447c">SQL Pipeline</text>
<text x="490" y="346" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185fa5">Text-to-SQL · Structured data</text>

<!-- Arrows: RAG and SQL to LLM layer -->
<line x1="190" y1="358" x2="280" y2="408" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="490" y1="358" x2="400" y2="408" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LLM Abstraction Layer -->
<rect x="150" y="408" width="380" height="56" rx="8" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
